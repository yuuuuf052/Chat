    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(255, 254, 252, 1) 0%, rgba(252, 249, 245, 1) 100%);
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            position: fixed; /* 鎖定全域 */
            left: 0;
            top: 0;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(197, 179, 161, 0.35);
            border-radius: 20px;
        }
        img {
            -webkit-user-drag: none;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .dot-bounce {
            animation: bounce 1.2s infinite ease-in-out;
        }
        .dot-bounce:nth-child(2) { animation-delay: 0.2s; }
        .dot-bounce:nth-child(3) { animation-delay: 0.4s; }

        @keyframes reply-pulse {
            0 { background-color: rgba(197, 179, 161, 0); }
            30% { background-color: rgba(197, 179, 161, 0.25); }
            100% { background-color: rgba(197, 179, 161, 0); }
        }
        .message-highlight {
            animation: reply-pulse 1.8s ease-out;
            border-radius: 24px;
        }
    </style>
</head>
<body class="flex items-center justify-center p-0 md:p-4 overflow-hidden relative w-full h-full">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            query, 
            orderBy, 
            limit, 
            onSnapshot, 
            serverTimestamp,
            doc,
            updateDoc,
            arrayUnion,
            setDoc,
            deleteDoc
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCS9qKnVEYjRzKOXOb3u2gQej1Pc1qJr1c",
            authDomain: "my-simple-chat-50e3e.firebaseapp.com",
            projectId: "my-simple-chat-50e3e",
            storageBucket: "my-simple-chat-50e3e.firebasestorage.app",
            messagingSenderId: "98528300481",
            appId: "1:98528300481:web:d816e74665facef2113340",
            measurementId: "G-CHXE28LVYD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const loginContainer = document.getElementById("login-container");
        const chatContainer = document.getElementById("chat-container");
        const usernameInput = document.getElementById("username-input");
        const loginBtn = document.getElementById("login-btn");
        const currentUserTag = document.getElementById("current-user-tag");
        const headerAvatarBox = document.getElementById("header-avatar-box");
        const logoutBtn = document.getElementById("logout-btn");
        const messageBox = document.getElementById("message-box");
        const messageInput = document.getElementById("message-input");
        const sendBtn = document.getElementById("send-btn");
        const emojiTrigger = document.getElementById("emoji-trigger");
        const emojiPicker = document.getElementById("emoji-picker");
        const toastNotification = document.getElementById("toast-notification");
        const toastMessage = document.getElementById("toast-message");
        const typingIndicator = document.getElementById("typing-indicator");
        const typingText = document.getElementById("typing-text");
        const replyPreviewBar = document.getElementById("reply-preview-bar");
        const replyTargetSender = document.getElementById("reply-target-sender");
        const replyTargetContent = document.getElementById("reply-target-content");
        const cancelReplyBtn = document.getElementById("cancel-reply-btn");
        const searchTrigger = document.getElementById("search-trigger");
        const searchBarContainer = document.getElementById("search-bar-container");
        const searchInput = document.getElementById("search-input");
        const searchClose = document.getElementById("search-close");
        const imageTrigger = document.getElementById("image-trigger");
        const imageInput = document.getElementById("image-input");
        const scrollToBottomBtn = document.getElementById("scroll-to-bottom-btn");
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");
        const defaultAvatarsList = document.getElementById("default-avatars-list");
        const avatarUploadTrigger = document.getElementById("avatar-upload-trigger");
        const avatarFileInput = document.getElementById("avatar-file-input");
        const selectedAvatarPreview = document.getElementById("selected-avatar-preview");
        const inputArea = document.getElementById("input-area");

        let nickname = "";
        let currentAvatar = "🧸";
        let allMessages = [];
        let activeFilter = "";
        let replyToMsg = null;
        let isTyping = false;
        let typingTimeout = null;

        // =======================================================
        // 🔥【iOS 鍵盤防檔 終極修正（Window 捲軸鎖定法）】
        // =======================================================
        function adjustLayoutForKeyboard() {
            if (window.innerWidth >= 768) {
                // 桌面端重置
                chatContainer.style.position = "";
                chatContainer.style.left = "";
                chatContainer.style.top = "";
                chatContainer.style.width = "";
                chatContainer.style.height = "";
                chatContainer.style.borderRadius = "";
                inputArea.style.paddingBottom = "16px";
                return;
            }

            if (!window.visualViewport) return;

            const vh = window.visualViewport.height;
            const vt = window.visualViewport.offsetTop;
            const windowHeight = window.innerHeight;

            // 1. 直接將容器「釘死」在視覺視區的最頂端，高度精確等於可見高度
            chatContainer.style.position = "fixed";
            chatContainer.style.left = "0px";
            chatContainer.style.top = `${vt}px`;
            chatContainer.style.width = "100%";
            chatContainer.style.height = `${vh}px`;
            chatContainer.style.borderRadius = "0px";

            // 2. 判斷鍵盤彈起：如果當前高度比內視鏡高度小 120px 以上
            const isKeyboardOpen = (windowHeight - vh) > 120;
            if (isKeyboardOpen) {
                // 額外加上 padding-bottom (墊高 28px) 確保完全衝破 iOS 完成列的遮擋
                inputArea.style.paddingBottom = "28px";
                
                // 強制將歷史訊息滾動至最底
                setTimeout(() => {
                    messageBox.scrollTop = messageBox.scrollHeight;
                }, 50);
            } else {
                inputArea.style.paddingBottom = "16px";
            }
        }

        // 當輸入框聚焦時，徹底鎖死視窗滾動，禁止 iOS 發瘋式上移
        const forceScrollReset = () => {
            window.scrollTo(0, 0);
        };

        // 註冊 Viewport 事件
        if (window.visualViewport) {
            window.visualViewport.addEventListener("resize", adjustLayoutForKeyboard);
            window.visualViewport.addEventListener("scroll", adjustLayoutForKeyboard);
        }
        window.addEventListener("resize", adjustLayoutForKeyboard);

        // 綁定輸入框獲取/失去焦線事件
        messageInput.addEventListener("focus", () => {
            // 點擊瞬間開始強推，每隔幾毫秒重新鎖死，防止 iOS 的滾動動畫偷跑
            let count = 0;
            const interval = setInterval(() => {
                forceScrollReset();
                adjustLayoutForKeyboard();
                if (++count > 5) clearInterval(interval);
            }, 50);
        });

        messageInput.addEventListener("blur", () => {
            setTimeout(() => {
                adjustLayoutForKeyboard();
                forceScrollReset();
            }, 100);
        });

        // 攔截整個網頁的滾動事件，只要輸入框還在打字，網頁就必須留在頂部 (0,0)
        window.addEventListener("scroll", () => {
            if (document.activeElement === messageInput) {
                forceScrollReset();
            }
        });
        // =======================================================

        const DEFAULT_AVATARS = [
            { id: "teddy", val: "🧸", bg: "#F5EFEB" },
            { id: "cat", val: "🐱", bg: "#F8F1EB" },
            { id: "cloud", val: "☁️", bg: "#EBF1F5" },
            { id: "leaf", val: "🌿", bg: "#EBF5EB" },
            { id: "coffee", val: "☕", bg: "#ECE6DF" }
        ];

        function initAvatarSelector() {
            defaultAvatarsList.innerHTML = "";
            DEFAULT_AVATARS.forEach((avatar) => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "w-8 h-8 rounded-full border border-[#FAF6F0] flex items-center justify-center text-base cursor-pointer hover:scale-105 active:scale-95 transition-transform duration-100 shadow-sm";
                btn.style.backgroundColor = avatar.bg;
                btn.textContent = avatar.val;
                btn.addEventListener("click", () => setAvatar(avatar.val, false));
                defaultAvatarsList.appendChild(btn);
            });
        }

        function setAvatar(avatarVal, isCustom = false) {
            currentAvatar = avatarVal;
            if (isCustom) {
                selectedAvatarPreview.innerHTML = `<img src="${avatarVal}" class="w-full h-full object-cover rounded-full" />`;
            } else {
                selectedAvatarPreview.textContent = avatarVal;
                const found = DEFAULT_AVATARS.find(a => a.val === avatarVal);
                selectedAvatarPreview.style.backgroundColor = found ? found.bg : "#FCFAF7";
            }
        }

        avatarUploadTrigger.addEventListener("click", () => avatarFileInput.click());

        async function setTypingStatus(status) {
            if (!nickname) return;
            try {
                const typingRef = doc(db, "typing", nickname);
                if (status) {
                    await setDoc(typingRef, { sender: nickname, timestamp: serverTimestamp() });
                } else {
                    await deleteDoc(typingRef);
                }
            } catch (error) {}
        }

        messageInput.addEventListener("input", () => {
            if (!nickname) return;
            if (!isTyping) {
                isTyping = true;
                setTypingStatus(true);
            }
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                isTyping = false;
                setTypingStatus(false);
            }, 3000);
        });

        avatarFileInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith("image/")) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement("canvas");
                    const DIM = 96;
                    canvas.width = DIM;
                    canvas.height = DIM;
                    const ctx = canvas.getContext("2d");
                    const size = Math.min(img.width, img.height);
                    ctx.drawImage(img, (img.width - size) / 2, (img.height - size) / 2, size, size, 0, 0, DIM, DIM);
                    setAvatar(canvas.toDataURL("image/jpeg", 0.7), true);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function showToast(msg) {
            toastMessage.textContent = msg;
            toastNotification.classList.remove("translate-y-[-100px]", "opacity-0", "pointer-events-none");
            toastNotification.classList.add("translate-y-0", "opacity-100");
            setTimeout(() => {
                toastNotification.classList.add("translate-y-[-100px]", "opacity-0", "pointer-events-none");
                toastNotification.classList.remove("translate-y-0", "opacity-100");
            }, 2500);
        }

        searchTrigger.addEventListener("click", () => {
            if (searchBarContainer.classList.contains("hidden")) {
                searchBarContainer.classList.remove("hidden");
                setTimeout(() => {
                    searchBarContainer.classList.remove("-translate-y-4", "opacity-0");
                    searchBarContainer.classList.add("translate-y-0", "opacity-100");
                    searchInput.focus();
                }, 10);
            } else {
                hideSearchBar();
            }
        });

        searchClose.addEventListener("click", hideSearchBar);
        function hideSearchBar() {
            searchInput.value = "";
            activeFilter = "";
            renderMessageUI();
            searchBarContainer.classList.remove("translate-y-0", "opacity-100");
            searchBarContainer.classList.add("-translate-y-4", "opacity-0");
            setTimeout(() => searchBarContainer.classList.add("hidden"), 300);
        }

        searchInput.addEventListener("input", (e) => {
            activeFilter = e.target.value.trim().toLowerCase();
            renderMessageUI();
        });

        messageBox.addEventListener("scroll", () => {
            const threshold = 200;
            const isScrollUp = messageBox.scrollHeight - messageBox.scrollTop - messageBox.clientHeight > threshold;
            if (isScrollUp) {
                scrollToBottomBtn.classList.remove("opacity-0", "scale-90", "translate-y-4", "pointer-events-none");
                scrollToBottomBtn.classList.add("opacity-100", "scale-100", "translate-y-0");
            } else {
                scrollToBottomBtn.classList.remove("opacity-100", "scale-100", "translate-y-0");
                scrollToBottomBtn.classList.add("opacity-0", "scale-90", "translate-y-4", "pointer-events-none");
            }
        });

        scrollToBottomBtn.addEventListener("click", () => {
            messageBox.scrollTo({ top: messageBox.scrollHeight, behavior: "smooth" });
        });

        emojiTrigger.addEventListener("click", (e) => {
            e.stopPropagation();
            if (emojiPicker.classList.contains("hidden")) {
                emojiPicker.classList.remove("hidden");
                setTimeout(() => {
                    emojiPicker.classList.remove("opacity-0", "scale-95");
                    emojiPicker.classList.add("opacity-100", "scale-100");
                }, 10);
            } else {
                closeEmojiPicker();
            }
        });

        function closeEmojiPicker() {
            emojiPicker.classList.remove("opacity-100", "scale-100");
            emojiPicker.classList.add("opacity-0", "scale-95");
            setTimeout(() => emojiPicker.classList.add("hidden"), 300);
        }

        document.querySelectorAll(".emoji-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                messageInput.value += btn.textContent;
                messageInput.focus();
                closeEmojiPicker();
            });
        });

        document.addEventListener("click", () => {
            if (!emojiPicker.classList.contains("hidden")) closeEmojiPicker();
        });

        imageTrigger.addEventListener("click", () => imageInput.click());

        // =======================================================
        // 📸【圖片高畫質壓縮發送邏輯】
        // =======================================================
        async function handleImageUpload(file) {
            if (!file || !file.type.startsWith("image/")) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = async function() {
                    const canvas = document.createElement("canvas");
                    let width = img.width;
                    let height = img.height;
                    
                    // 🌟 1. 將最大寬高限制提升至 1400px (視網膜螢幕非常清晰)
                    const MAX_DIM = 1400; 
                    if (width > height) {
                        if (width > MAX_DIM) { height *= MAX_DIM / width; width = MAX_DIM; }
                    } else {
                        if (height > MAX_DIM) { width *= MAX_DIM / height; height = MAX_DIM; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext("2d");
                    
                    // 啟用平滑縮放演算法，防止文字截圖縮小後產生毛邊
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = "high";
                    
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 🌟 2. 將畫質調高至 0.88，獲得極度清晰的文字和細節
                    const base64Data = canvas.toDataURL("image/jpeg", 0.88);
                    const replyData = replyToMsg ? {
                        replyToId: replyToMsg.id,
                        replyToSender: replyToMsg.sender,
                        replyToContent: replyToMsg.content || "",
                        replyToImage: replyToMsg.image || ""
                    } : {};

                    try {
                        await addDoc(collection(db, "messages"), {
                            sender: nickname,
                            senderAvatar: currentAvatar,
                            content: "",
                            image: base64Data,
                            timestamp: serverTimestamp(),
                            isRecalled: false,
                            readBy: [],
                            ...replyData
                        });
                        imageInput.value = "";
                        clearReply();
                    } catch (error) {
                        showToast("發送失敗，請再試一次");
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        imageInput.addEventListener("change", (e) => handleImageUpload(e.target.files[0]));
        messageInput.addEventListener("paste", (e) => {
            const items = (e.clipboardData || window.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf("image") !== -1) {
                    const file = items[i].getAsFile();
                    if (file) { e.preventDefault(); handleImageUpload(file); }
                }
            }
        });

        lightbox.addEventListener("click", () => {
            lightbox.classList.remove("opacity-100");
            lightboxImg.classList.remove("scale-100");
            lightboxImg.classList.add("scale-95");
            setTimeout(() => lightbox.classList.add("hidden"), 300);
        });

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.remove("hidden");
            setTimeout(() => {
                lightbox.classList.remove("opacity-0", "pointer-events-none");
                lightboxImg.classList.remove("scale-95");
                lightboxImg.classList.add("scale-100");
            }, 10);
        }

        initAvatarSelector();

        const savedNickname = localStorage.getItem("chat_nickname");
        const savedAvatar = localStorage.getItem("chat_avatar");
        if (savedNickname) {
            nickname = savedNickname;
            if (savedAvatar) currentAvatar = savedAvatar;
            currentUserTag.querySelector("span").textContent = nickname;
            renderHeaderAvatar();
            loginContainer.classList.add("hidden");
            chatContainer.classList.remove("hidden");
            chatContainer.classList.add("flex");
            adjustLayoutForKeyboard();
            listenForMessages();
        }

        function setReplyTo(msg) {
            replyToMsg = msg;
            replyTargetSender.textContent = `@${msg.sender}`;
            replyTargetContent.textContent = msg.content || "🖼️ [照片訊息]";
            replyPreviewBar.classList.remove("hidden");
            messageInput.focus();
        }

        function clearReply() {
            replyToMsg = null;
            replyPreviewBar.classList.add("hidden");
        }

        cancelReplyBtn.addEventListener("click", clearReply);
        loginBtn.addEventListener("click", joinChat);
        usernameInput.addEventListener("keypress", (e) => { if (e.key === "Enter") joinChat(); });

        function joinChat() {
            const name = usernameInput.value.trim();
            if (!name) { showToast("請輸入一個您喜歡的名字！"); return; }
            nickname = name;
            localStorage.setItem("chat_nickname", nickname);
            localStorage.setItem("chat_avatar", currentAvatar);
            currentUserTag.querySelector("span").textContent = nickname;
            renderHeaderAvatar();
            loginContainer.style.opacity = "0";
            setTimeout(() => {
                loginContainer.classList.add("hidden");
                chatContainer.classList.remove("hidden");
                chatContainer.classList.add("flex");
                adjustLayoutForKeyboard();
                listenForMessages();
            }, 300);
        }

        function renderHeaderAvatar() {
            if (currentAvatar.startsWith("data:image")) {
                headerAvatarBox.innerHTML = `<img src="${currentAvatar}" class="w-full h-full object-cover rounded-full" />`;
            } else {
                headerAvatarBox.textContent = currentAvatar;
                const found = DEFAULT_AVATARS.find(a => a.val === currentAvatar);
                headerAvatarBox.style.backgroundColor = found ? found.bg : "#FCFAF7";
            }
        }

        logoutBtn.addEventListener("click", async () => {
            await setTypingStatus(false);
            localStorage.removeItem("chat_nickname");
            localStorage.removeItem("chat_avatar");
            nickname = "";
            usernameInput.value = "";
            setAvatar("🧸", false);
            clearReply();
            loginContainer.style.opacity = "1";
            loginContainer.classList.remove("hidden");
            chatContainer.classList.add("hidden");
            chatContainer.classList.remove("flex");
        });

        window.addEventListener("beforeunload", () => { if (nickname) setTypingStatus(false); });

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            const replyData = replyToMsg ? {
                replyToId: replyToMsg.id,
                replyToSender: replyToMsg.sender,
                replyToContent: replyToMsg.content || "",
                replyToImage: replyToMsg.image || ""
            } : {};

            try {
                isTyping = false;
                clearTimeout(typingTimeout);
                await setTypingStatus(false);
                await addDoc(collection(db, "messages"), {
                    sender: nickname,
                    senderAvatar: currentAvatar,
                    content: text,
                    image: "",
                    timestamp: serverTimestamp(),
                    isRecalled: false,
                    readBy: [],
                    ...replyData
                });
                messageInput.value = "";
                clearReply();
            } catch (error) {}
        }

        sendBtn.addEventListener("click", sendMessage);
        messageInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

        function listenForMessages() {
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"), limit(100));
            onSnapshot(q, (snapshot) => {
                allMessages = [];
                snapshot.forEach((doc) => {
                    allMessages.push({ id: doc.id, ...doc.data() });
                });
                renderMessageUI();
                markMessagesAsRead(allMessages);
            });
            listenForTyping();
        }

        function listenForTyping() {
            const q = collection(db, "typing");
            onSnapshot(q, (snapshot) => {
                const typingUsers = [];
                const now = Date.now();
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const docTime = data.timestamp ? data.timestamp.toDate().getTime() : now;
                    if (data.sender !== nickname && (now - docTime < 10000)) {
                        typingUsers.push(data.sender);
                    }
                });
                if (typingUsers.length > 0) {
                    typingText.textContent = `${typingUsers.join("、")} 正在輸入中`;
                    typingIndicator.classList.remove("hidden", "opacity-0", "translate-y-4", "pointer-events-none");
                    typingIndicator.classList.add("opacity-100", "translate-y-0");
                } else {
                    typingIndicator.classList.remove("opacity-100", "translate-y-0");
                    typingIndicator.classList.add("opacity-0", "translate-y-4", "pointer-events-none");
                    setTimeout(() => {
                        if (typingIndicator.classList.contains("opacity-0")) typingIndicator.classList.add("hidden");
                    }, 300);
                }
            });
        }

        async function markMessagesAsRead(messages) {
            if (!nickname) return;
            messages.forEach(async (msg) => {
                if (msg.sender !== nickname && !msg.isRecalled) {
                    const readByArray = msg.readBy || [];
                    if (!readByArray.includes(nickname)) {
                        try {
                            await updateDoc(doc(db, "messages", msg.id), { readBy: arrayUnion(nickname) });
                        } catch (e) {}
                    }
                }
            });
        }

        async function recallMessage(messageId) {
            try {
                await updateDoc(doc(db, "messages", messageId), { isRecalled: true });
                showToast("訊息已成功收回。");
            } catch (e) {}
        }

        function renderMessageUI() {
            messageBox.innerHTML = "";
            const displayedMessages = allMessages.filter(msg => {
                if (!activeFilter) return true;
                if (msg.isRecalled) return false;
                if (msg.content && msg.content.toLowerCase().includes(activeFilter)) return true;
                if (msg.sender && msg.sender.toLowerCase().includes(activeFilter)) return true;
                return false;
            });

            if (displayedMessages.length === 0 && activeFilter) {
                const emptyNotify = document.createElement("div");
                emptyNotify.className = "text-center text-[10px] text-[#A89C8F] py-8 italic";
                emptyNotify.textContent = `未搜尋到包含「${activeFilter}」的歷史紀錄。`;
                messageBox.appendChild(emptyNotify);
                return;
            }

            displayedMessages.forEach((msg) => {
                const isSelf = msg.sender === nickname;
                const isRecalled = msg.isRecalled === true;

                const wrapper = document.createElement("div");
                wrapper.className = `flex w-full items-start gap-3 ${isSelf ? 'justify-end' : 'justify-start'}`;
                wrapper.id = `msg-${msg.id}`;

                const avatarEl = document.createElement("div");
                avatarEl.className = "w-9 h-9 rounded-full overflow-hidden flex items-center justify-center shrink-0 border border-[#FAF6F0] text-sm";
                const senderAvatar = msg.senderAvatar || "🧸";
                if (senderAvatar.startsWith("data:image")) {
                    avatarEl.innerHTML = `<img src="${senderAvatar}" class="w-full h-full object-cover" />`;
                } else {
                    avatarEl.textContent = senderAvatar;
                    const found = DEFAULT_AVATARS.find(a => a.val === senderAvatar);
                    avatarEl.style.backgroundColor = found ? found.bg : "#FCFAF7";
                }

                const bubbleCol = document.createElement("div");
                bubbleCol.className = `flex flex-col max-w-[86%] ${isSelf ? 'items-end' : 'items-start'} group relative`;

                const nameLabel = document.createElement("div");
                nameLabel.className = "text-[9px] text-[#A89C8F] mb-0.5 px-2 font-medium flex items-center gap-1.5";
                let displayName = msg.sender;
                if (activeFilter && msg.sender.toLowerCase().includes(activeFilter)) {
                    displayName = displayName.replace(new RegExp(`(${activeFilter})`, 'gi'), `<mark class="bg-[#FAF0E6] text-[#C5B3A1] rounded px-1 font-semibold">$1</mark>`);
                    nameLabel.innerHTML = displayName;
                } else {
                    nameLabel.textContent = displayName;
                }

                if (!isRecalled) {
                    const replyActionBtn = document.createElement("button");
                    replyActionBtn.className = "text-[#C5B3A1] hover:text-[#B7A491] ml-1 text-[9px] transition opacity-0 group-hover:opacity-100 focus:opacity-100 focus:outline-none cursor-pointer flex items-center gap-0.5";
                    replyActionBtn.innerHTML = `<i class="ph ph-chat-text"></i> 回覆`;
                    replyActionBtn.addEventListener("click", (e) => { e.stopPropagation(); setReplyTo(msg); });
                    nameLabel.appendChild(replyActionBtn);
                }

                if (isSelf && !isRecalled) {
                    const recallBtn = document.createElement("button");
                    recallBtn.className = "text-[#C5B3A1] hover:text-[#B7A491] ml-1 text-[9px] transition opacity-0 group-hover:opacity-100 focus:opacity-100 focus:outline-none cursor-pointer flex items-center gap-0.5";
                    recallBtn.innerHTML = `<i class="ph ph-arrow-u-up-left"></i> 收回`;
                    recallBtn.addEventListener("click", (e) => { e.stopPropagation(); recallMessage(msg.id); });
                    nameLabel.appendChild(recallBtn);
                }

                let replyToWrapper = null;
                if (msg.replyToId && !isRecalled) {
                    replyToWrapper = document.createElement("div");
                    replyToWrapper.className = "mb-1.5 p-2 pl-2.5 border-l-2 border-[#C5B3A1] bg-black/[0.02] rounded-r-xl text-[10px] text-[#8C7E70] cursor-pointer hover:bg-black/[0.04] transition duration-150 flex flex-col gap-0.5 max-w-full select-none";
                    const replyHeader = document.createElement("div");
                    replyHeader.className = "font-bold text-[#C5B3A1] flex items-center gap-1 text-[9px] tracking-wide";
                    replyHeader.innerHTML = `<i class="ph ph-arrow-bend-up-left text-[10px]"></i> 回覆 @${msg.replyToSender}`;
                    replyToWrapper.appendChild(replyHeader);

                    const replyBody = document.createElement("div");
                    replyBody.className = "truncate max-w-[200px] text-[#A89C8F]";
                    const originalMsgObj = allMessages.find(m => m.id === msg.replyToId);
                    if (originalMsgObj && originalMsgObj.isRecalled) {
                        replyBody.textContent = "原訊息已被收回";
                        replyBody.className = "italic text-stone-400";
                    } else if (msg.replyToImage) {
                        replyBody.textContent = "🖼️ 照片預覽";
                    } else {
                        replyBody.textContent = msg.replyToContent || "";
                    }
                    replyToWrapper.appendChild(replyBody);

                    replyToWrapper.addEventListener("click", (e) => {
                        e.stopPropagation();
                        const targetEl = document.getElementById(`msg-${msg.replyToId}`);
                        if (targetEl) {
                            targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            targetEl.classList.add("message-highlight");
                            setTimeout(() => targetEl.classList.remove("message-highlight"), 1800);
                        } else {
                            showToast("找不到原始訊息，可能已被收回！");
                        }
                    });
                }

                const textBubble = document.createElement("div");
                if (isRecalled) {
                    textBubble.className = "px-[18px] py-[10px] rounded-[24px] text-xs leading-relaxed border italic text-stone-400/80 bg-stone-100/40 border-stone-200";
                    textBubble.innerHTML = `<i class="ph ph-warning-circle inline mr-1 text-sm"></i>訊息已收回`;
                } else if (msg.image) {
                    textBubble.className = `p-1 rounded-[24px] shadow-[0_2px_12px_rgba(180,170,160,0.01)] border overflow-hidden max-w-full ${isSelf ? 'bg-[#F3ECE3] border-[#FAF6F0]' : 'bg-[#FBF9F6] border-[#FAF6F0]'}`;
                    if (replyToWrapper) { replyToWrapper.classList.add("mx-2", "mt-2"); textBubble.appendChild(replyToWrapper); }
                    const imgEl = document.createElement("img");
                    imgEl.src = msg.image;
                    imgEl.className = "rounded-[20px] max-w-full max-h-[160px] object-cover cursor-zoom-in";
                    imgEl.addEventListener("click", () => openLightbox(msg.image));
                    textBubble.appendChild(imgEl);
                } else {
                    textBubble.className = `px-[18px] py-[10px] rounded-[24px] text-xs md:text-sm leading-relaxed break-words whitespace-pre-wrap shadow-[0_2px_12px_rgba(180,170,160,0.01)] border ${isSelf ? 'bg-[#F3ECE3] text-[#5C4D3C] border-[#FAF6F0]' : 'bg-[#FBF9F6] text-[#5C4D3C] border-[#FAF6F0]'}`;
                    if (replyToWrapper) textBubble.appendChild(replyToWrapper);
                    const textContentSpan = document.createElement("span");
                    let displayContent = msg.content || "";
                    if (activeFilter && displayContent.toLowerCase().includes(activeFilter)) {
                        displayContent = displayContent.replace(new RegExp(`(${activeFilter})`, 'gi'), `<text class="bg-[#FAF0E6] text-[#C5B3A1] rounded px-0.5 font-medium">$1</text>`);
                        textContentSpan.innerHTML = displayContent;
                    } else {
                        textContentSpan.textContent = displayContent;
                    }
                    textBubble.appendChild(textContentSpan);
                }

                const bubbleContainer = document.createElement("div");
                bubbleContainer.className = `flex items-end gap-1.5 max-w-full ${isSelf ? 'flex-row-reverse' : 'flex-row'}`;

                const timeText = document.createElement("span");
                timeText.className = "text-[9px] text-[#A89C8F]/60 select-none mb-1 shrink-0 font-medium";
                let timeStr = "剛剛";
                if (msg.timestamp) {
                    const date = msg.timestamp.toDate ? msg.timestamp.toDate() : new Date(msg.timestamp);
                    timeStr = `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
                }
                timeText.textContent = timeStr;

                let statusText = null;
                if (isSelf && !isRecalled) {
                    statusText = document.createElement("span");
                    statusText.className = "text-[9px] text-[#A89C8F]/50 select-none mb-1 shrink-0 font-medium";
                    const readByArray = msg.readBy || [];
                    const readers = readByArray.filter(u => u !== nickname);
                    if (readers.length > 0) {
                        statusText.textContent = `已讀 ${readers.length > 1 ? readers.length : ''}`;
                        statusText.className = "text-[9px] text-[#C2D3B8] select-none mb-1 shrink-0 font-semibold";
                    } else {
                        statusText.textContent = "未讀";
                    }
                }

                if (isSelf) {
                    bubbleContainer.appendChild(textBubble);
                    bubbleContainer.appendChild(timeText);
                    if (statusText) bubbleContainer.appendChild(statusText);
                } else {
                    bubbleContainer.appendChild(textBubble);
                    bubbleContainer.appendChild(timeText);
                }

                bubbleCol.appendChild(nameLabel);
                bubbleCol.appendChild(bubbleContainer);

                if (isSelf) {
                    wrapper.appendChild(bubbleCol);
                    wrapper.appendChild(avatarEl);
                } else {
                    wrapper.appendChild(avatarEl);
                    wrapper.appendChild(bubbleCol);
                }
                messageBox.appendChild(wrapper);
            });

            setTimeout(() => {
                messageBox.scrollTo({ top: messageBox.scrollHeight, behavior: 'smooth' });
            }, 50);
        }
    </script>
</body>
</html>
