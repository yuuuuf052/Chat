<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>溫柔即時公共空間</title>
    <!-- 匯入 Tailwind CSS 與優雅無襯線字體 Inter / 繁中 Noto Sans -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- 匯入 Phosphor Icons 溫和流線型圖標庫 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(255, 254, 252, 1) 0%, rgba(252, 249, 245, 1) 100%);
            -webkit-tap-highlight-color: transparent;
        }
        /* 精緻極輕捲軸樣式 */
        #message-box::-webkit-scrollbar {
            width: 4px;
        }
        #message-box::-webkit-scrollbar-track {
            background: transparent;
        }
        #message-box::-webkit-scrollbar-thumb {
            background-color: rgba(214, 197, 179, 0.15);
            border-radius: 20px;
        }
        #message-box::-webkit-scrollbar-thumb:hover {
            background-color: rgba(214, 197, 179, 0.3);
        }
        /* 避免圖片在燈箱預覽中被選取 */
        img {
            -webkit-user-drag: none;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-[100dvh] p-0 md:p-4 overflow-hidden relative">

    <!-- 氛圍柔焦暖光球裝飾 (大幅降低明度與飽和度，營造安靜、無干擾的極簡感) -->
    <div class="absolute w-[350px] h-[350px] rounded-full bg-[#EAD8C3]/5 blur-[120px] -top-20 -left-20 pointer-events-none"></div>
    <div class="absolute w-[450px] h-[450px] rounded-full bg-[#DFD3C3]/5 blur-[150px] -bottom-30 -right-20 pointer-events-none"></div>

    <!-- 頂部浮動通知提示 (精美客製化 Toast) -->
    <div id="toast-notification" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-[#C5B3A1] text-white px-6 py-3 rounded-full shadow-[0_8px_24px_rgba(197,179,161,0.15)] flex items-center gap-2 transition-all duration-300 transform translate-y-[-100px] opacity-0 pointer-events-none">
        <i class="ph-bold ph-info text-sm"></i>
        <span id="toast-message" class="text-xs font-medium tracking-wide">請輸入有效的名稱！</span>
    </div>

    <!-- 圖片點擊放大 Lightbox 預覽 -->
    <div id="lightbox" class="hidden fixed inset-0 z-50 bg-[#3A332C]/30 backdrop-blur-md flex items-center justify-center p-4 transition-all duration-300 opacity-0 pointer-events-none cursor-zoom-out">
        <button id="lightbox-close" class="absolute top-6 right-6 w-11 h-11 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center text-xl transition duration-200">
            <i class="ph-bold ph-x"></i>
        </button>
        <img id="lightbox-img" class="max-w-full max-h-[85vh] rounded-[24px] shadow-2xl transition-transform duration-300 scale-95" src="" alt="放大預覽">
    </div>

    <!-- 1. 溫柔奶油風登入介面 (手機端自適應) -->
    <div id="login-container" class="w-full max-w-md bg-white/90 backdrop-blur-lg border border-[#FBF9F6] p-6 md:p-8 rounded-[32px] shadow-[0_16px_48px_rgba(180,170,160,0.03)] text-center transition-all duration-500 z-10 mx-4 md:mx-0">
        <div class="w-12 h-12 bg-[#FBF9F6] text-[#C5B3A1] rounded-2xl mx-auto flex items-center justify-center text-xl mb-3 shadow-inner">
            <i class="ph-bold ph-sparkle"></i>
        </div>
        <h2 class="text-lg font-bold text-[#5C4D3C] mb-1 tracking-wide">暖煦公共空間</h2>
        <p class="text-xs text-[#A89C8F] mb-6 leading-relaxed">微風流淌的角落。給自己一個名字與溫暖的頭像，隨時開始對話。</p>
        
        <!-- 頭像選擇與自訂區 -->
        <div class="mb-6 text-left">
            <label class="text-[11px] font-semibold text-[#8C7E70] uppercase tracking-wider block mb-2 px-1">選擇您的頭像角色：</label>
            <div class="flex items-center gap-3 flex-wrap justify-between bg-[#FCFAF7] p-3 rounded-2xl border border-[#FAF6F0]">
                <!-- 預設頭像列表 (柔和色調 Emojis) -->
                <div class="flex items-center gap-2" id="default-avatars-list">
                    <!-- 由 JavaScript 動態生成預設選項 -->
                </div>
                <!-- 上傳自訂頭像按鈕 -->
                <button id="avatar-upload-trigger" class="text-[10px] text-[#A89C8F] hover:text-[#8C7E70] bg-white border border-[#EFEBE4] px-2.5 py-1.5 rounded-xl transition duration-200 flex items-center gap-1 active:scale-95 font-medium">
                    <i class="ph ph-camera text-xs"></i>
                    <span>上傳照片</span>
                </button>
                <input type="file" id="avatar-file-input" class="hidden" accept="image/*">
            </div>
            <!-- 當前選擇頭像預覽 -->
            <div class="flex items-center gap-2 mt-3 px-1">
                <span class="text-[10px] text-[#A89C8F]">當前預覽：</span>
                <div id="selected-avatar-preview" class="w-8 h-8 rounded-full border border-[#EFEBE4] flex items-center justify-center text-base overflow-hidden bg-white">
                    🧸
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <input type="text" id="username-input" class="w-full px-5 py-3.5 bg-[#FCFAF7] border border-[#FAF6F0] rounded-2xl text-xs text-[#5C4D3C] placeholder-[#C5B3A1] focus:outline-none focus:border-[#C5B3A1] focus:ring-1 focus:ring-[#C5B3A1] transition duration-200" placeholder="怎麼稱呼您呢？" maxlength="15">
            <button id="login-btn" class="w-full py-3.5 bg-[#C5B3A1] hover:bg-[#B7A491] text-white font-medium rounded-2xl text-xs transition duration-300 shadow-sm shadow-[#C5B3A1]/10 active:scale-[0.98]">
                漫步進入
            </button>
        </div>
        <div class="mt-5">
            <span class="text-[9px] text-[#D2C5B8] tracking-widest uppercase">免註冊安全通訊系統</span>
        </div>
    </div>

    <!-- 2. 燕麥奶油風聊天室主介面 (適配手機滿版與防裁切邊距) -->
    <div id="chat-container" class="hidden w-full md:max-w-3xl h-[100dvh] md:h-[88vh] bg-white/95 backdrop-blur-lg border-0 md:border border-[#FAF6F0] md:rounded-[32px] rounded-none shadow-[0_16px_48px_rgba(180,170,160,0.03)] flex-col overflow-hidden z-10 transition-all duration-500 relative">
        
        <!-- 頂部導航列 -->
        <div id="chat-header" class="bg-white/90 border-b border-[#FAF6F0] px-5 py-3 flex justify-between items-center z-10 shrink-0">
            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 bg-[#FCFAF7] text-[#C5B3A1] rounded-full flex items-center justify-center text-sm">
                    <i class="ph-bold ph-planet"></i>
                </div>
                <div>
                    <h3 class="font-bold text-[#5C4D3C] text-xs md:text-sm tracking-wide">公共空間</h3>
                    <div class="flex items-center gap-1">
                        <span class="w-1 h-1 bg-[#C2D3B8] rounded-full animate-pulse"></span>
                        <span class="text-[9px] text-[#A89C8F]">即時連線中</span>
                    </div>
                </div>
            </div>
            
            <!-- 右上角工具列與暱稱大頭貼 -->
            <div class="flex items-center gap-1.5">
                <button id="search-trigger" class="w-8 h-8 rounded-full bg-[#FCFAF7] hover:bg-[#FAF6F0] border border-[#FAF6F0] text-[#A89C8F] flex items-center justify-center transition duration-200" title="搜尋對話紀錄">
                    <i class="ph-bold ph-magnifying-glass text-xs"></i>
                </button>
                
                <!-- 精美頭像與名稱顯示 -->
                <div id="current-user-tag" class="text-[10px] bg-[#FCFAF7] text-[#8C7E70] pl-1.5 pr-3 py-1 rounded-full font-medium flex items-center gap-1.5 border border-[#FAF6F0]">
                    <div id="header-avatar-box" class="w-5 h-5 rounded-full bg-white border border-[#EFEBE4] overflow-hidden flex items-center justify-center text-xs">
                        🧸
                    </div>
                    <span class="truncate max-w-[80px]">未登入</span>
                </div>
                
                <button id="logout-btn" class="w-8 h-8 rounded-full bg-[#FCFAF7] hover:bg-[#FAF6F0] border border-[#FAF6F0] text-[#A89C8F] hover:text-[#C5B3A1] flex items-center justify-center transition duration-200" title="登出 / 切換暱稱">
                    <i class="ph-bold ph-sign-out text-xs"></i>
                </button>
            </div>
        </div>

        <!-- 歷史紀錄關鍵字搜尋欄 -->
        <div id="search-bar-container" class="hidden px-5 py-2.5 bg-[#FCFAF7] border-b border-[#FAF6F0] flex items-center gap-2 transition-all duration-300 transform -translate-y-4 opacity-0 shrink-0">
            <div class="relative flex-1">
                <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-[#C5B3A1] text-xs"></i>
                <input type="text" id="search-input" class="w-full pl-8 pr-4 py-2 bg-white border border-[#FAF6F0] rounded-xl text-xs text-[#5C4D3C] placeholder-[#C5B3A1] focus:outline-none focus:border-[#C5B3A1] transition duration-200" placeholder="搜尋對話關鍵字..." autocomplete="off">
            </div>
            <button id="search-close" class="text-[10px] text-[#A89C8F] hover:text-[#8C7E70] px-1.5 py-1 font-medium transition duration-200">
                關閉
            </button>
        </div>

        <!-- 訊息對話區 (精準的左右對齊，頭像阻擋，100% 杜絕右側已讀標籤裁切) -->
        <div id="message-box" class="flex-1 px-4 md:px-6 py-4 overflow-y-auto bg-[#FDFCFB]/40 flex flex-col gap-4 relative">
            <!-- 訊息由 JavaScript 即時載入 -->
        </div>

        <!-- 滑動到最新訊息按鈕 (莫蘭迪燕麥奶油風懸浮設計) -->
        <button id="scroll-to-bottom-btn" class="absolute bottom-20 right-6 z-20 w-10 h-10 bg-[#C5B3A1]/90 hover:bg-[#B7A491] text-white rounded-full flex items-center justify-center shadow-[0_8px_24px_rgba(197,179,161,0.3)] transition-all duration-300 opacity-0 scale-90 translate-y-4 pointer-events-none" title="下滑到最新訊息">
            <i class="ph-bold ph-caret-double-down text-lg"></i>
        </button>

        <!-- 表情符號面板 (Emoji Picker) -->
        <div id="emoji-picker" class="hidden absolute bottom-20 left-4 md:left-6 z-30 bg-white border border-[#FAF6F0] p-3 rounded-2xl shadow-[0_12px_36px_rgba(180,170,160,0.08)] max-w-[260px] transition-all duration-300 opacity-0 scale-95 origin-bottom-left">
            <div class="text-[9px] text-[#A89C8F] mb-1.5 font-medium tracking-wide">挑選溫柔心情：</div>
            <div class="grid grid-cols-6 gap-1.5 text-lg">
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">😊</button>
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">🥰</button>
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">✨</button>
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">🧸</button>
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">☁️</button>
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">🧁</button>
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">☘️</button>
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">☕</button>
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">🐱</button>
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">💌</button>
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">🌿</button>
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">💡</button>
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">😀</button>
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">🤗</button>
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">😶‍🌫️</button>
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">🫩</button>
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">🥲</button>
                <button class="emoji-btn hover:bg-[#FCFAF7] p-1 rounded-lg transition">👀</button>
            </div>
        </div>

        <!-- 底部輸入與發送欄 (手機端圓角鍵盤適配) -->
        <div id="input-area" class="p-3 md:p-4 bg-white border-t border-[#FAF6F0] flex items-center gap-2 relative shrink-0">
            <!-- 表情按鈕 -->
            <button id="emoji-trigger" class="w-10 h-10 bg-[#FCFAF7] hover:bg-[#FAF6F0] text-[#A89C8F] border border-[#FAF6F0] rounded-xl flex items-center justify-center text-lg transition duration-200" title="選擇表情符號">
                <i class="ph-bold ph-smiley"></i>
            </button>
            
            <!-- 圖片傳送按鈕 -->
            <button id="image-trigger" class="w-10 h-10 bg-[#FCFAF7] hover:bg-[#FAF6F0] text-[#A89C8F] border border-[#FAF6F0] rounded-xl flex items-center justify-center text-lg transition duration-200" title="傳送照片">
                <i class="ph-bold ph-image"></i>
            </button>
            <input type="file" id="image-input" class="hidden" accept="image/*">

            <input type="text" id="message-input" class="flex-1 py-2.5 px-4 bg-[#FCFAF7] border border-[#FAF6F0] rounded-xl text-xs text-[#5C4D3C] placeholder-[#C5B3A1] focus:outline-none focus:border-[#C5B3A1] transition duration-200" placeholder="說點溫柔的話吧..." autocomplete="off">
            
            <button id="send-btn" class="w-10 h-10 bg-[#C5B3A1] hover:bg-[#B7A491] text-white rounded-xl flex items-center justify-center transition duration-200 shadow-sm shadow-[#C5B3A1]/5 active:scale-95">
                <i class="ph-bold ph-paper-plane-right text-base"></i>
            </button>
        </div>
    </div>

    <!-- 載入 Firebase Web SDK (v10) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            query, 
            orderBy, 
            limit, 
            onSnapshot, 
            serverTimestamp,
            doc,
            updateDoc,
            arrayUnion
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ================= 使用您在 image_797d02.png 提供的專屬參數 =================
        const firebaseConfig = {
            apiKey: "AIzaSyCS9qKnVEYjRzKOXOb3u2gQej1Pc1qJr1c",
            authDomain: "my-simple-chat-50e3e.firebaseapp.com",
            projectId: "my-simple-chat-50e3e",
            storageBucket: "my-simple-chat-50e3e.firebasestorage.app",
            messagingSenderId: "98528300481",
            appId: "1:98528300481:web:d816e74665facef2113340",
            measurementId: "G-CHXE28LVYD"
        };
        // =========================================================================

        // 初始化 Firebase 與 Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 綁定頁面 DOM 元素
        const loginContainer = document.getElementById("login-container");
        const chatContainer = document.getElementById("chat-container");
        const usernameInput = document.getElementById("username-input");
        const loginBtn = document.getElementById("login-btn");
        const currentUserTag = document.getElementById("current-user-tag");
        const headerAvatarBox = document.getElementById("header-avatar-box");
        const logoutBtn = document.getElementById("logout-btn");
        const messageBox = document.getElementById("message-box");
        const messageInput = document.getElementById("message-input");
        const sendBtn = document.getElementById("send-btn");
        const emojiTrigger = document.getElementById("emoji-trigger");
        const emojiPicker = document.getElementById("emoji-picker");
        const toastNotification = document.getElementById("toast-notification");
        const toastMessage = document.getElementById("toast-message");

        // 搜尋與上傳綁定
        const searchTrigger = document.getElementById("search-trigger");
        const searchBarContainer = document.getElementById("search-bar-container");
        const searchInput = document.getElementById("search-input");
        const searchClose = document.getElementById("search-close");
        const imageTrigger = document.getElementById("image-trigger");
        const imageInput = document.getElementById("image-input");

        // 滑動至最新按鈕
        const scrollToBottomBtn = document.getElementById("scroll-to-bottom-btn");

        // Lightbox 放大相關元素
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");

        // 大頭貼設置
        const defaultAvatarsList = document.getElementById("default-avatars-list");
        const avatarUploadTrigger = document.getElementById("avatar-upload-trigger");
        const avatarFileInput = document.getElementById("avatar-file-input");
        const selectedAvatarPreview = document.getElementById("selected-avatar-preview");

        // 全域狀態變數
        let nickname = "";
        let currentAvatar = "🧸"; // 預設頭像 (可以是 emoji 或是 base64)
        let allMessages = []; // 歷史緩衝區，用於極速本地端搜尋
        let activeFilter = ""; // 當前關鍵字搜尋

        // 預設精選暖色莫蘭迪大頭貼列表 (Emoji ＋ 柔和配色背景)
        const DEFAULT_AVATARS = [
            { id: "teddy", val: "🧸", bg: "#F5EFEB" },
            { id: "cat", val: "🐱", bg: "#F8F1EB" },
            { id: "cloud", val: "☁️", bg: "#EBF1F5" },
            { id: "leaf", val: "🌿", bg: "#EBF5EB" },
            { id: "coffee", val: "☕", bg: "#ECE6DF" }
        ];

        // 渲染登入介面的預設頭像選項
        function initAvatarSelector() {
            defaultAvatarsList.innerHTML = "";
            DEFAULT_AVATARS.forEach((avatar) => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "w-8 h-8 rounded-full border border-[#FAF6F0] flex items-center justify-center text-base cursor-pointer hover:scale-105 active:scale-95 transition-transform duration-100 shadow-sm";
                btn.style.backgroundColor = avatar.bg;
                btn.textContent = avatar.val;
                
                btn.addEventListener("click", () => {
                    setAvatar(avatar.val, false);
                });
                defaultAvatarsList.appendChild(btn);
            });
        }

        function setAvatar(avatarVal, isCustom = false) {
            currentAvatar = avatarVal;
            if (isCustom) {
                // 如果是自訂 Base64 圖片
                selectedAvatarPreview.innerHTML = `<img src="${avatarVal}" class="w-full h-full object-cover rounded-full" />`;
            } else {
                // 如果是預設 Emojis
                selectedAvatarPreview.textContent = avatarVal;
                // 找到對應背景色套用
                const found = DEFAULT_AVATARS.find(a => a.val === avatarVal);
                selectedAvatarPreview.style.backgroundColor = found ? found.bg : "#FCFAF7";
            }
        }

        // 觸發自訂大頭照上傳
        avatarUploadTrigger.addEventListener("click", () => {
            avatarFileInput.click();
        });

        // 處理並壓縮個人頭像
        avatarFileInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith("image/")) {
                showToast("這似乎不是合法的圖片檔案！");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement("canvas");
                    // 個人頭像只需要小尺寸 (96x96 正方形)
                    const DIM = 96;
                    canvas.width = DIM;
                    canvas.height = DIM;
                    const ctx = canvas.getContext("2d");

                    // 等比例局部裁切並繪製為正方形
                    const size = Math.min(img.width, img.height);
                    const sx = (img.width - size) / 2;
                    const sy = (img.height - size) / 2;

                    ctx.drawImage(img, sx, sy, size, size, 0, 0, DIM, DIM);
                    const base64Data = canvas.toDataURL("image/jpeg", 0.7);
                    setAvatar(base64Data, true);
                    showToast("頭像上傳並裁切完成！");
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 表情通知器
        function showToast(msg) {
            toastMessage.textContent = msg;
            toastNotification.classList.remove("translate-y-[-100px]", "opacity-0", "pointer-events-none");
            toastNotification.classList.add("translate-y-0", "opacity-100");
            
            setTimeout(() => {
                toastNotification.classList.add("translate-y-[-100px]", "opacity-0", "pointer-events-none");
                toastNotification.classList.remove("translate-y-0", "opacity-100");
            }, 2500);
        }

        // 控制搜尋列滑入滑出
        searchTrigger.addEventListener("click", () => {
            if (searchBarContainer.classList.contains("hidden")) {
                searchBarContainer.classList.remove("hidden");
                setTimeout(() => {
                    searchBarContainer.classList.remove("-translate-y-4", "opacity-0");
                    searchBarContainer.classList.add("translate-y-0", "opacity-100");
                    searchInput.focus();
                }, 10);
            } else {
                hideSearchBar();
            }
        });

        searchClose.addEventListener("click", () => {
            hideSearchBar();
        });

        function hideSearchBar() {
            searchInput.value = "";
            activeFilter = "";
            renderMessageUI(); // 重新渲染完整歷史
            searchBarContainer.classList.remove("translate-y-0", "opacity-100");
            searchBarContainer.classList.add("-translate-y-4", "opacity-0");
            setTimeout(() => {
                searchBarContainer.classList.add("hidden");
            }, 300);
        }

        // 搜尋字元即時監聽
        searchInput.addEventListener("input", (e) => {
            activeFilter = e.target.value.trim().toLowerCase();
            renderMessageUI();
        });

        // 監聽滾動以顯示/隱藏一鍵下滑按鈕
        messageBox.addEventListener("scroll", () => {
            const threshold = 200; // 距離底部超過 200px 就顯示
            const isScrollUp = messageBox.scrollHeight - messageBox.scrollTop - messageBox.clientHeight > threshold;
            
            if (isScrollUp) {
                scrollToBottomBtn.classList.remove("opacity-0", "scale-90", "translate-y-4", "pointer-events-none");
                scrollToBottomBtn.classList.add("opacity-100", "scale-100", "translate-y-0");
            } else {
                scrollToBottomBtn.classList.remove("opacity-100", "scale-100", "translate-y-0");
                scrollToBottomBtn.classList.add("opacity-0", "scale-90", "translate-y-4", "pointer-events-none");
            }
        });

        // 點擊一鍵滑動至最新訊息
        scrollToBottomBtn.addEventListener("click", () => {
            messageBox.scrollTo({
                top: messageBox.scrollHeight,
                behavior: "smooth"
            });
        });

        // 表情盤收合
        emojiTrigger.addEventListener("click", (e) => {
            e.stopPropagation();
            if (emojiPicker.classList.contains("hidden")) {
                emojiPicker.classList.remove("hidden");
                setTimeout(() => {
                    emojiPicker.classList.remove("opacity-0", "scale-95");
                    emojiPicker.classList.add("opacity-100", "scale-100");
                }, 10);
            } else {
                closeEmojiPicker();
            }
        });

        function closeEmojiPicker() {
            emojiPicker.classList.remove("opacity-100", "scale-100");
            emojiPicker.classList.add("opacity-0", "scale-95");
            setTimeout(() => {
                emojiPicker.classList.add("hidden");
            }, 300);
        }

        document.querySelectorAll(".emoji-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                messageInput.value += btn.textContent;
                messageInput.focus();
                closeEmojiPicker();
            });
        });

        document.addEventListener("click", () => {
            if (!emojiPicker.classList.contains("hidden")) {
                closeEmojiPicker();
            }
        });

        imageTrigger.addEventListener("click", () => {
            imageInput.click();
        });

        // 壓縮與上傳對話圖片
        imageInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (!file.type.startsWith("image/")) {
                showToast("這似乎不是合法的圖片檔案！");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = async function() {
                    const canvas = document.createElement("canvas");
                    let width = img.width;
                    let height = img.height;

                    const MAX_DIM = 600; 
                    if (width > height) {
                        if (width > MAX_DIM) {
                            height *= MAX_DIM / width;
                            width = MAX_DIM;
                        }
                    } else {
                        if (height > MAX_DIM) {
                            width *= MAX_DIM / height;
                            height = MAX_DIM;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;

                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, width, height);

                    const base64Data = canvas.toDataURL("image/jpeg", 0.65);

                    try {
                        showToast("上傳處理中...");
                        await addDoc(collection(db, "messages"), {
                            sender: nickname,
                            senderAvatar: currentAvatar,
                            content: "",
                            image: base64Data,
                            timestamp: serverTimestamp(),
                            isRecalled: false,
                            readBy: []
                        });
                        imageInput.value = ""; 
                    } catch (error) {
                        console.error("圖片上傳失敗：", error);
                        showToast("圖片上傳失敗，請重試！");
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        lightbox.addEventListener("click", () => {
            lightbox.classList.remove("opacity-100");
            lightboxImg.classList.remove("scale-100");
            lightboxImg.classList.add("scale-95");
            setTimeout(() => {
                lightbox.classList.add("hidden");
            }, 300);
        });

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.remove("hidden");
            setTimeout(() => {
                lightbox.classList.remove("opacity-0", "pointer-events-none");
                lightboxImg.classList.remove("scale-95");
                lightboxImg.classList.add("scale-100");
            }, 10);
        }

        // 初始化頭像選擇器
        initAvatarSelector();

        // 讀取 LocalStorage 快取，實現免重複輸入暱稱登入
        const savedNickname = localStorage.getItem("chat_nickname");
        const savedAvatar = localStorage.getItem("chat_avatar");
        if (savedNickname) {
            nickname = savedNickname;
            if (savedAvatar) {
                currentAvatar = savedAvatar;
            }
            currentUserTag.querySelector("span").textContent = nickname;
            renderHeaderAvatar();
            loginContainer.classList.add("hidden");
            chatContainer.classList.remove("hidden");
            chatContainer.classList.add("flex");
            listenForMessages();
        }

        loginBtn.addEventListener("click", joinChat);
        usernameInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") joinChat();
        });

        function joinChat() {
            const name = usernameInput.value.trim();
            if (!name) {
                showToast("請輸入一個您喜歡的名字！");
                return;
            }
            
            nickname = name;
            localStorage.setItem("chat_nickname", nickname);
            localStorage.setItem("chat_avatar", currentAvatar);
            currentUserTag.querySelector("span").textContent = nickname;
            renderHeaderAvatar();
            
            loginContainer.style.opacity = "0";
            setTimeout(() => {
                loginContainer.classList.add("hidden");
                chatContainer.classList.remove("hidden");
                chatContainer.classList.add("flex");
                listenForMessages();
            }, 300);
        }

        // 渲染頂端狀態列的使用者頭像
        function renderHeaderAvatar() {
            if (currentAvatar.startsWith("data:image")) {
                headerAvatarBox.innerHTML = `<img src="${currentAvatar}" class="w-full h-full object-cover rounded-full" />`;
            } else {
                headerAvatarBox.textContent = currentAvatar;
                const found = DEFAULT_AVATARS.find(a => a.val === currentAvatar);
                headerAvatarBox.style.backgroundColor = found ? found.bg : "#FCFAF7";
            }
        }

        logoutBtn.addEventListener("click", () => {
            localStorage.removeItem("chat_nickname");
            localStorage.removeItem("chat_avatar");
            nickname = "";
            usernameInput.value = "";
            setAvatar("🧸", false);
            loginContainer.style.opacity = "1";
            loginContainer.classList.remove("hidden");
            chatContainer.classList.add("hidden");
            chatContainer.classList.remove("flex");
        });

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            try {
                await addDoc(collection(db, "messages"), {
                    sender: nickname,
                    senderAvatar: currentAvatar,
                    content: text,
                    image: "",
                    timestamp: serverTimestamp(),
                    isRecalled: false,
                    readBy: []
                });
                messageInput.value = "";
            } catch (error) {
                console.error("發送失敗：", error);
                showToast("連線好像有點不穩，請再試一次！");
            }
        }

        sendBtn.addEventListener("click", sendMessage);
        messageInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        // 監聽訊息列表同步
        function listenForMessages() {
            const q = query(
                collection(db, "messages"), 
                orderBy("timestamp", "asc"), 
                limit(100)
            );

            onSnapshot(q, (snapshot) => {
                allMessages = [];
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    allMessages.push({
                        id: doc.id,
                        ...data
                    });
                });
                renderMessageUI();
                markMessagesAsRead(allMessages);
            }, (error) => {
                console.error("Firestore 連線中斷：", error);
                showToast("連線中斷，正在嘗試重連...");
            });
        }

        // 自動已讀功能 (背景同步)
        async function markMessagesAsRead(messages) {
            if (!nickname) return;
            messages.forEach(async (msg) => {
                if (msg.sender !== nickname && !msg.isRecalled) {
                    const readByArray = msg.readBy || [];
                    if (!readByArray.includes(nickname)) {
                        try {
                            const messageRef = doc(db, "messages", msg.id);
                            await updateDoc(messageRef, {
                                readBy: arrayUnion(nickname)
                            });
                        } catch (error) {
                            console.error("更新已讀狀態失敗：", error);
                        }
                    }
                }
            });
        }

        async function recallMessage(messageId) {
            try {
                const messageRef = doc(db, "messages", messageId);
                await updateDoc(messageRef, {
                    isRecalled: true
                });
                showToast("訊息已成功收回。");
            } catch (error) {
                console.error("收回失敗：", error);
                showToast("收回失敗，請稍後重試。");
            }
        }

        // 渲染主對話框 (圓形氣泡 ＋ 頭像外夾防溢出，100% 杜絕裁切)
        function renderMessageUI() {
            messageBox.innerHTML = ""; 

            // 搜尋過濾
            const displayedMessages = allMessages.filter(msg => {
                if (!activeFilter) return true;
                if (msg.isRecalled) return false; 
                if (msg.content && msg.content.toLowerCase().includes(activeFilter)) return true;
                if (msg.sender && msg.sender.toLowerCase().includes(activeFilter)) return true;
                return false;
            });

            if (displayedMessages.length === 0 && activeFilter) {
                const emptyNotify = document.createElement("div");
                emptyNotify.className = "text-center text-[10px] text-[#A89C8F] py-8 italic";
                emptyNotify.textContent = `未搜尋到包含「${activeFilter}」的歷史紀錄。`;
                messageBox.appendChild(emptyNotify);
                return;
            }

            displayedMessages.forEach((msg) => {
                const isSelf = msg.sender === nickname;
                const isRecalled = msg.isRecalled === true;

                // 最外層：整列布局 (使用 gap-3 並控制左右靠齊)
                const wrapper = document.createElement("div");
                wrapper.className = `flex w-full items-start gap-3 ${isSelf ? 'justify-end' : 'justify-start'}`;

                // 頭像元素 (w-9 h-9 圓形緩衝)
                const avatarEl = document.createElement("div");
                avatarEl.className = "w-9 h-9 rounded-full overflow-hidden flex items-center justify-center shrink-0 border border-[#FAF6F0] text-sm";
                
                const senderAvatar = msg.senderAvatar || "🧸";
                if (senderAvatar.startsWith("data:image")) {
                    avatarEl.innerHTML = `<img src="${senderAvatar}" class="w-full h-full object-cover" />`;
                } else {
                    avatarEl.textContent = senderAvatar;
                    const found = DEFAULT_AVATARS.find(a => a.val === senderAvatar);
                    avatarEl.style.backgroundColor = found ? found.bg : "#FCFAF7";
                }

                // 訊息主體欄位 (最大寬度拉長至 86%，提供更寬敞的閱讀體驗)
                const bubbleCol = document.createElement("div");
                bubbleCol.className = `flex flex-col max-w-[86%] ${isSelf ? 'items-end' : 'items-start'} group relative`;

                // 暱稱標籤與收回按鈕
                const nameLabel = document.createElement("div");
                nameLabel.className = "text-[9px] text-[#A89C8F] mb-0.5 px-2 font-medium flex items-center gap-1.5";
                
                let displayName = msg.sender;
                if (activeFilter && msg.sender.toLowerCase().includes(activeFilter)) {
                    displayName = displayName.replace(new RegExp(`(${activeFilter})`, 'gi'), `<mark class="bg-[#FAF0E6] text-[#C5B3A1] rounded px-1 font-semibold">$1</mark>`);
                    nameLabel.innerHTML = displayName;
                } else {
                    nameLabel.textContent = displayName;
                }

                // 僅限自己發送且未收回的訊息能顯示收回按鈕
                if (isSelf && !isRecalled) {
                    const recallBtn = document.createElement("button");
                    recallBtn.className = "text-[#C5B3A1] hover:text-[#B7A491] ml-1 text-[9px] transition opacity-0 group-hover:opacity-100 focus:opacity-100 focus:outline-none cursor-pointer flex items-center gap-0.5";
                    recallBtn.innerHTML = `<i class="ph ph-arrow-u-up-left"></i> 收回`;
                    recallBtn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        recallMessage(msg.id);
                    });
                    nameLabel.appendChild(recallBtn);
                }

                // 氣泡包裝 (將原本錯誤的 px-4.5 py-2.5 換成極緻呼吸邊距 px-[18px] py-[10px])
                const textBubble = document.createElement("div");
                
                if (isRecalled) {
                    // 已收回狀態
                    textBubble.className = `px-[18px] py-[10px] rounded-[24px] text-xs leading-relaxed border italic text-stone-400/80 bg-stone-100/40 border-stone-200`;
                    textBubble.innerHTML = `<i class="ph ph-warning-circle inline mr-1 text-sm"></i>訊息已收回`;
                } else if (msg.image) {
                    // 圓角圖片框
                    textBubble.className = `p-1 rounded-[24px] shadow-[0_2px_12px_rgba(180,170,160,0.01)] border cursor-zoom-in overflow-hidden max-w-full ${
                        isSelf ? 'bg-[#F3ECE3] border-[#FAF6F0]' : 'bg-[#FBF9F6] border-[#FAF6F0]'
                    }`;
                    
                    const imgEl = document.createElement("img");
                    imgEl.src = msg.image;
                    imgEl.className = "rounded-[20px] max-w-full max-h-[160px] object-cover transition-transform hover:scale-[1.01] duration-200";
                    imgEl.addEventListener("click", () => {
                        openLightbox(msg.image);
                    });
                    textBubble.appendChild(imgEl);
                } else {
                    // 圓形文字對話氣泡 (修正邊距 px-[18px] py-[10px]，杜絕任何超出溢出)
                    textBubble.className = `px-[18px] py-[10px] rounded-[24px] text-xs md:text-sm leading-relaxed break-words whitespace-pre-wrap shadow-[0_2px_12px_rgba(180,170,160,0.01)] border ${
                        isSelf 
                            ? 'bg-[#F3ECE3] text-[#5C4D3C] border-[#FAF6F0]' 
                            : 'bg-[#FBF9F6] text-[#5C4D3C] border-[#FAF6F0]'
                    }`;

                    let displayContent = msg.content || "";
                    if (activeFilter && displayContent.toLowerCase().includes(activeFilter)) {
                        displayContent = displayContent.replace(new RegExp(`(${activeFilter})`, 'gi'), `<mark class="bg-[#FAF0E6] text-[#C5B3A1] rounded px-0.5 font-medium">$1</mark>`);
                        textBubble.innerHTML = displayContent;
                    } else {
                        textBubble.textContent = displayContent;
                    }
                }

                // 訊息內容與已讀狀態
                const bubbleContainer = document.createElement("div");
                bubbleContainer.className = `flex items-end gap-1.5 max-w-full ${isSelf ? 'flex-row-reverse' : 'flex-row'}`;

                // 渲染已讀/未讀標籤 (移至氣泡側邊，確保有足夠空隙不會被擠壓)
                if (isSelf && !isRecalled) {
                    const statusText = document.createElement("span");
                    statusText.className = "text-[9px] text-[#A89C8F]/50 select-none mb-1 shrink-0 font-medium";
                    
                    const readByArray = msg.readBy || [];
                    const readers = readByArray.filter(u => u !== nickname);
                    if (readers.length > 0) {
                        statusText.textContent = `已讀 ${readers.length > 1 ? readers.length : ''}`;
                        statusText.className = "text-[9px] text-[#C2D3B8] select-none mb-1 shrink-0 font-semibold";
                    } else {
                        statusText.textContent = "未讀";
                    }
                    bubbleContainer.appendChild(statusText);
                }

                bubbleContainer.appendChild(textBubble);

                bubbleCol.appendChild(nameLabel);
                bubbleCol.appendChild(bubbleContainer);

                // 排序大頭貼和對話區：自己發送的頭像在右邊，別人的在左邊
                if (isSelf) {
                    wrapper.appendChild(bubbleCol);
                    wrapper.appendChild(avatarEl);
                } else {
                    wrapper.appendChild(avatarEl);
                    wrapper.appendChild(bubbleCol);
                }

                messageBox.appendChild(wrapper);
            });

            // 平滑自動向下滾動
            setTimeout(() => {
                messageBox.scrollTo({
                    top: messageBox.scrollHeight,
                    behavior: 'smooth'
                });
            }, 50);
        }
    </script>
</body>
</html>
